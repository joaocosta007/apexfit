services:
  postgres:
    image: postgres:16-alpine
    container_name: apexfit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: apexfit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - apexfit-postgres-data:/var/lib/postgresql/data

volumes:
  apexfit-postgres-data: